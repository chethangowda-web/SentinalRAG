services:

  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinelrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinelrag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelrag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sentinelrag
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Qdrant ───────────────────────────────────────────
  # Healthcheck uses process check (kill -0 1) because the official Qdrant image
  # does not ship with curl, wget, or Python. PID 1 is always the qdrant binary.
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: sentinelrag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sentinelrag
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelrag-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinelrag
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # change-me-in-production is safe for local dev; generate a real key for production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
      UPLOAD_DIR: /data/uploads
      PROCESSED_DIR: /data/processed
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      # Ensure no CUDA devices are visible (CPU-only)
      CUDA_VISIBLE_DEVICES: ""
    volumes:
      - app_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - sentinelrag
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: sentinelrag-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sentinelrag
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── NGINX Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sentinelrag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - sentinelrag
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  qdrant_data:
  app_data:

networks:
  sentinelrag:
    name: sentinelrag-network
    driver: bridge
